# Eris host-owner compose file.
# Ships to agent-host owners. Pull-only (no build keys).
# Usage: docker compose -f host-owner.yml up -d
# GPU: docker compose -f host-owner.yml -f host-owner.gpu.yml up -d

name: interloom-host

x-defaults:
  DOCKER_ORG: &docker_org ${DOCKER_ORG:-cameron59061}
  TAG: &tag ${TAG:-latest}

services:
  agent-host:
    image: ${DOCKER_ORG:-cameron59061}/interloom-agent-host:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:7420:7420"
    environment:
      PORT: "7420"
      DATA_DIR: /data
      MODELS_DIR: /models
      NETWORK_URL: ${NETWORK_URL:-https://interloom-net.tryeris.com}
      INFERENCE_URL: http://inference:8080
      FETCHER_URL: http://model-fetcher:7423
      UPDATER_URL: http://updater:7424
    volumes:
      - il_data:/data
      - il_models:/models
    depends_on:
      inference:
        condition: service_started
      model-fetcher:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7420/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  inference:
    image: ${DOCKER_ORG:-cameron59061}/interloom-inference:${TAG:-latest}
    restart: unless-stopped
    environment:
      MODELS_DIR: /models
    volumes:
      - il_models:/models
    # health: image HEALTHCHECK (supervisor heartbeat) — a port-8080 probe would
    # report unhealthy in the legal zero-loaded-models state

  # Existing installs predate the fetcher's non-root boundary and can have a
  # root-owned model volume. This finite, networkless migration changes only the
  # paths the fetcher must mutate; completed model payload files stay untouched.
  model-volume-init:
    image: ${DOCKER_ORG:-cameron59061}/interloom-model-fetcher:${TAG:-latest}
    restart: "no"
    user: "0:0"
    read_only: true
    network_mode: none
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    command: ["/usr/local/bin/interloom-model-volume-init"]
    volumes:
      - il_models:/models

  model-fetcher:
    image: ${DOCKER_ORG:-cameron59061}/interloom-model-fetcher:${TAG:-latest}
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      MODELS_DIR: /models
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - il_models:/models
    depends_on:
      model-volume-init:
        condition: service_completed_successfully
    healthcheck:
      # python probe — the slim fetcher image ships no curl
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request as u; u.urlopen(''http://localhost:7423/readyz'', timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  updater:
    image: ${DOCKER_ORG:-cameron59061}/interloom-host-updater:${TAG:-latest}
    restart: unless-stopped
    environment:
      NETWORK_URL: ${NETWORK_URL:-https://interloom-net.tryeris.com}
      DOCKER_ORG: ${DOCKER_ORG:-cameron59061}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # INTERLOOM_DIR must be the ABSOLUTE host path of the install dir (the
      # installer writes it): a containerized compose client (the updater's
      # finisher) cannot resolve a relative bind against the host filesystem.
      - ${INTERLOOM_DIR:-.}:/host-config

volumes:
  il_data:
    name: interloom-data
  il_models:
    name: interloom-models
