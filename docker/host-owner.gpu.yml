# GPU override for host-owner compose.
# Extends host-owner.yml with NVIDIA GPU support.
# Usage: docker compose -f host-owner.yml -f host-owner.gpu.yml up -d

name: interloom-host

services:
  agent-host:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  inference:
    # CUDA image is not CI-versioned (built/pushed manually) — it floats on its
    # own tag so pinning TAG to a release does not break GPU hosts.
    image: ${DOCKER_ORG:-cameron59061}/interloom-inference:${CUDA_TAG:-latest-cuda}
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
